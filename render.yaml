services:
  - type: web
    name: ideago-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ideago-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AI_PROVIDER
        value: mock

databases:
  - name: ideago-db
    plan: free
    databaseName: ideago
    user: ideago
